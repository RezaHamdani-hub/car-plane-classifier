<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Car vs Plane — Classifier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
    --car: #ff6b35;
    --plane: #47b4ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  /* subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
  }

  /* Header */
  header {
    margin-bottom: 3rem;
    animation: fadeDown 0.6s ease both;
  }

  .tag {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    display: block;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
  }

  /* Drop Zone */
  .dropzone {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    background: var(--surface);
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: #1a1a1a;
  }

  .dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
    transition: transform 0.3s;
  }

  .dropzone:hover .drop-icon { transform: translateY(-4px); }

  .drop-label {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .drop-label strong {
    color: var(--text);
    display: block;
    font-size: 0.9rem;
    margin-bottom: 0.25rem;
  }

  /* Preview */
  .preview-wrap {
    display: none;
    margin-top: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }

  .preview-wrap img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    filter: grayscale(20%);
  }

  .preview-change {
    position: absolute;
    bottom: 0.75rem;
    right: 0.75rem;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.3rem 0.6rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s;
    letter-spacing: 0.1em;
  }

  .preview-change:hover { color: var(--accent); }

  /* Button */
  .btn {
    width: 100%;
    margin-top: 1rem;
    padding: 1rem;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 4px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: none;
    animation: fadeUp 0.4s ease both;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    animation: fadeUp 0.3s ease both;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.75rem;
  }

  /* Result */
  .result {
    display: none;
    margin-top: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .result-header {
    padding: 0.6rem 1rem;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  .result-body {
    padding: 1.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .result-emoji {
    font-size: 3rem;
    flex-shrink: 0;
    animation: pop 0.4s 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  .result-label {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }

  .result-label.car   { color: var(--car); }
  .result-label.plane { color: var(--plane); }

  .result-confidence {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .confidence-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 0.5rem;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .confidence-fill.car   { background: var(--car); }
  .confidence-fill.plane { background: var(--plane); }

  .result-meta {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* Reset */
  .reset-btn {
    width: 100%;
    margin-top: 0.75rem;
    padding: 0.6rem;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.1em;
    display: none;
  }

  .reset-btn:hover { color: var(--text); border-color: var(--muted); }

  /* Footer */
  footer {
    margin-top: 3rem;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <span class="tag">✦ ML Classifier · ECE Paris 2025–2026</span>
    <h1>Car vs<br/><span>Plane</span></h1>
    <p class="subtitle">// drop an image, get a prediction</p>
  </header>

  <!-- Drop Zone -->
  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*"/>
    <span class="drop-icon">🖼️</span>
    <div class="drop-label">
      <strong>Drop image here</strong>
      or click to browse
    </div>
  </div>

  <!-- Image Preview -->
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="preview"/>
    <button class="preview-change" id="changeBtn">change ↺</button>
  </div>

  <!-- Classify Button -->
  <button class="btn" id="classifyBtn" onclick="classify()">
    → Classify Image
  </button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    analyzing image...
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-header">
      <span>prediction</span>
      <span id="resultTime"></span>
    </div>
    <div class="result-body">
      <div class="result-emoji" id="resultEmoji"></div>
      <div>
        <div class="result-label" id="resultLabel"></div>
        <div class="result-confidence" id="resultConfidence"></div>
        <div class="confidence-bar">
          <div class="confidence-fill" id="confidenceFill"></div>
        </div>
      </div>
    </div>
    <div class="result-meta">
      <span id="resultRaw"></span>
      <span id="resultFile"></span>
    </div>
  </div>

  <!-- Reset -->
  <button class="reset-btn" id="resetBtn" onclick="reset()">↺ classify another image</button>

  <footer>
    <a href="/docs" target="_blank">api docs →</a>
    &nbsp;·&nbsp;
    model: cnn · tensorflow 2.21
    &nbsp;·&nbsp;
    acc: 78.27%
  </footer>
</div>

<script>
  const API_URL = window.location.origin + '/predict';

  const dropzone    = document.getElementById('dropzone');
  const fileInput   = document.getElementById('fileInput');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const classifyBtn = document.getElementById('classifyBtn');
  const changeBtn   = document.getElementById('changeBtn');
  const loading     = document.getElementById('loading');
  const result      = document.getElementById('result');
  const resetBtn    = document.getElementById('resetBtn');

  let selectedFile = null;

  // File select
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  // Drag & drop
  dropzone.addEventListener('dragover', e => {
    e.preventDefault();
    dropzone.classList.add('drag-over');
  });

  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));

  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  // Change image
  changeBtn.addEventListener('click', e => {
    e.stopPropagation();
    fileInput.click();
  });

  function loadFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      previewImg.src = ev.target.result;
      previewWrap.style.display = 'block';
      dropzone.style.display = 'none';
      classifyBtn.style.display = 'block';
      result.style.display = 'none';
      resetBtn.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  async function classify() {
    if (!selectedFile) return;

    classifyBtn.disabled = true;
    loading.style.display = 'block';
    result.style.display = 'none';

    const formData = new FormData();
    formData.append('file', selectedFile);

    const start = Date.now();

    try {
      const res  = await fetch(API_URL, { method: 'POST', body: formData });
      const data = await res.json();
      const elapsed = ((Date.now() - start) / 1000).toFixed(2);

      showResult(data, elapsed);
    } catch (err) {
      loading.style.display = 'none';
      classifyBtn.disabled = false;
      alert('⚠️ API error — make sure the server is running.');
    }
  }

  function showResult(data, elapsed) {
    loading.style.display = 'none';

    const label      = data.prediction;       // "car" or "airplane"
    const confidence = data.confidence;       // "99.56%"
    const raw        = data.raw_score;

    const iscar = label === 'car';
    const emoji = iscar ? '🚗' : '✈️';
    const confNum = parseFloat(confidence);

    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultLabel').textContent = label;
    document.getElementById('resultLabel').className = `result-label ${iscar ? 'car' : 'plane'}`;
    document.getElementById('resultConfidence').textContent = `confidence: ${confidence}`;
    document.getElementById('resultRaw').textContent = `raw_score: ${raw}`;
    document.getElementById('resultFile').textContent = `${elapsed}s · ${selectedFile.name}`;
    document.getElementById('resultTime').textContent = new Date().toLocaleTimeString();

    const fill = document.getElementById('confidenceFill');
    fill.className = `confidence-fill ${iscar ? 'car' : 'plane'}`;

    result.style.display = 'block';
    resetBtn.style.display = 'block';
    classifyBtn.style.display = 'none';

    // animate bar
    setTimeout(() => { fill.style.width = confNum + '%'; }, 100);
  }

  function reset() {
    selectedFile = null;
    fileInput.value = '';
    previewWrap.style.display = 'none';
    dropzone.style.display = 'block';
    classifyBtn.style.display = 'none';
    classifyBtn.disabled = false;
    result.style.display = 'none';
    resetBtn.style.display = 'none';
    loading.style.display = 'none';
  }
</script>
</body>
</html>
